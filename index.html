    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to overwrite the global fetch.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { /* ignore attempts to overwrite */ }
            });
          }
        } catch (e) {
          // If we can't patch it, just log and continue
          console.debug('Fetch protection skipped:', e.message);
        }
      })();
    </script>
